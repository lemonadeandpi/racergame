<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced 3D Racing Game</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui { position:absolute; top:10px; left:10px; color:white; z-index:10; }
#speed,#lap { font-size:18px; }
</style>
</head>
<body>

<div id="ui">
  <div id="speed">Speed: 0</div>
  <div id="lap">Lap: 1</div>
</div>

<!-- IMPORTANT: This is PURE HTML + JS. DO NOT run as .tsx or through a React/TypeScript build system -->
<!-- Rename file to index.html if needed -->

<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script>
// =========================
// BASIC TESTS (sanity checks)
// =========================
console.assert(typeof THREE !== 'undefined', 'THREE failed to load');

// SETUP
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

console.assert(renderer.domElement instanceof HTMLCanvasElement, 'Renderer failed');

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(50,100,50);
scene.add(light);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// TRACK
const track = [];
for(let i=0;i<100;i++){
  track.push(new THREE.Vector3(Math.sin(i*0.2)*10,0,-i*10));
}

console.assert(track.length === 100, 'Track generation failed');

// PLAYER
let player, velocity=0, direction=0, lap=1;

// FIX: ensure loader exists
if(!THREE.GLTFLoader){
  console.error('GLTFLoader failed to load');
}

const loader = new THREE.GLTFLoader();

loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF/CesiumMilkTruck.gltf',
  function(gltf){
    player = gltf.scene;
    player.scale.set(0.5,0.5,0.5);
    scene.add(player);
  },
  undefined,
  function(){
    console.warn('Model failed, using fallback');
    const fallback = new THREE.Mesh(
      new THREE.BoxGeometry(1,0.5,2),
      new THREE.MeshStandardMaterial({color:0x00ff00})
    );
    player = fallback;
    scene.add(player);
  }
);

// AI
const aiCars = [];
for(let i=0;i<3;i++){
  const car = new THREE.Mesh(
    new THREE.BoxGeometry(1,0.5,2),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  scene.add(car);
  aiCars.push({mesh:car, progress:i*10});
}

console.assert(aiCars.length === 3, 'AI creation failed');

// INPUT
let keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

// PHYSICS
const accel = 0.02;
const friction = 0.98;
const turnSpeed = 0.03;
const maxSpeed = 1;
let nitro = 0;

// LOOP
function animate(){
  requestAnimationFrame(animate);
  if(!player) return;

  if(keys['ArrowUp']) velocity += accel;
  else velocity *= friction;

  if(keys['Shift']) nitro = 0.05;
  else nitro *= 0.9;

  velocity = Math.min(maxSpeed, velocity + nitro);

  if(keys['ArrowLeft']) direction += turnSpeed;
  if(keys['ArrowRight']) direction -= turnSpeed;

  player.rotation.y = direction;
  player.position.x += Math.sin(direction)*velocity;
  player.position.z -= Math.cos(direction)*velocity;

  // collision bounds
  if(Math.abs(player.position.x) > 15) velocity *= 0.5;

  // AI follow track
  aiCars.forEach(ai=>{
    ai.progress += 0.1;
    let idx = Math.floor(ai.progress)%track.length;
    ai.mesh.position.copy(track[idx]);
  });

  // laps
  if(player.position.z < -900){
    player.position.z = 0;
    lap++;
    document.getElementById('lap').innerText = 'Lap: '+lap;
  }

  // camera
  camera.position.set(player.position.x, 5, player.position.z + 10);
  camera.lookAt(player.position);

  document.getElementById('speed').innerText = 'Speed: '+Math.floor(velocity*200);

  renderer.render(scene,camera);
}
animate();

// resize
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
