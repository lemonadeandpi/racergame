<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Racing Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      z-index: 10;
      font-family: Arial;
    }
    button, select { margin: 4px; padding: 6px; }
  </style>
</head>
<body>

<div id="ui">
  <button onclick="togglePause()">Pause</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
  <select onchange="changeCar(this.value)">
    <option value="0">Sport</option>
    <option value="1">Truck</option>
    <option value="2">Formula</option>
  </select>
</div>

<!-- THREE.JS CDN -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<script>
// BASIC SETUP
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTING
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

// ROAD
const roadGeo = new THREE.PlaneGeometry(20, 500);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
scene.add(road);

// CARS
const cars = [
  { color: 0xff0000, speed: 0.2 },
  { color: 0x0000ff, speed: 0.12 },
  { color: 0xffff00, speed: 0.3 }
];

let carMesh;
let carIndex = 0;
let speed = cars[0].speed;

function createCar() {
  if (carMesh) scene.remove(carMesh);

  const geo = new THREE.BoxGeometry(1, 0.5, 2);
  const mat = new THREE.MeshStandardMaterial({ color: cars[carIndex].color });

  carMesh = new THREE.Mesh(geo, mat);
  carMesh.position.y = 0.25;
  scene.add(carMesh);

  speed = cars[carIndex].speed;
}

createCar();

// CAMERA
camera.position.set(0, 3, 6);

// CONTROLS
let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// GAME STATE
let paused = false;

function togglePause() {
  paused = !paused;
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.body.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function changeCar(i) {
  carIndex = Number(i);
  createCar();
}

// RESIZE FIX (IMPORTANT FOR GITHUB PAGES)
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// GAME LOOP
function animate() {
  requestAnimationFrame(animate);

  if (!paused) {
    if (keys["ArrowLeft"]) carMesh.position.x -= speed;
    if (keys["ArrowRight"]) carMesh.position.x += speed;
    if (keys["ArrowUp"]) carMesh.position.z -= speed;
    if (keys["ArrowDown"]) carMesh.position.z += speed;

    // camera follow
    camera.position.x = carMesh.position.x;
    camera.position.z = carMesh.position.z + 6;
    camera.lookAt(carMesh.position);
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
