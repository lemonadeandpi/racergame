<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>racing gaem</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui { position:absolute; top:10px; left:10px; color:white; z-index:10; }
#speed,#lap,#pos,#count { font-size:18px; }
#count { font-size:40px; }
</style>
</head>
<body>

<div id="ui">
  <div id="count">3</div>
  <div id="speed">Speed: 0</div>
  <div id="lap">Lap: 1</div>
  <div id="pos">Position: 1</div>
</div>

<!-- FIX: Use NON-module scripts (GitHub Pages safe) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script>
// BASIC TEST
console.assert(typeof THREE !== 'undefined', 'THREE failed to load');

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(100,200,100);
scene.add(sun);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2000,2000),
  new THREE.MeshStandardMaterial({ color:0x2e8b57 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// TRACK + CHECKPOINTS
const track=[];
const checkpoints=[];
for(let i=0;i<400;i++){
  let p = new THREE.Vector3(Math.sin(i*0.1)*20,0,-i*10);
  track.push(p);
  if(i%50===0) checkpoints.push(p.clone());
}
console.assert(track.length === 400, 'Track failed');

// PLAYER
let player;
const loader = new THREE.GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF/CesiumMilkTruck.gltf',
  function(gltf){
    player = gltf.scene;
    player.scale.set(0.5,0.5,0.5);
    scene.add(player);
  },
  undefined,
  function(){
    console.warn('Model failed, using fallback');
    player = new THREE.Mesh(
      new THREE.BoxGeometry(1,0.5,2),
      new THREE.MeshStandardMaterial({color:0x00ff00})
    );
    scene.add(player);
  }
);

// AI
const aiCars=[];
for(let i=0;i<4;i++){
  const car=new THREE.Mesh(
    new THREE.BoxGeometry(1,0.5,2),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  scene.add(car);
  aiCars.push({mesh:car,progress:i*60});
}
console.assert(aiCars.length === 4, 'AI failed');

// INPUT
const keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

// PHYSICS
let velocity=0, angle=0, drift=0, lap=1, checkpointIndex=0;

const accel=0.02, friction=0.97, turnSpeed=0.04, driftFactor=0.92, maxSpeed=2;

// COUNTDOWN
let countdown=3;
let started=false;
const countEl=document.getElementById('count');
let interval=setInterval(()=>{
  countdown--;
  if(countdown<=0){ countEl.innerText="GO"; started=true; clearInterval(interval); }
  else countEl.innerText=countdown;
},1000);

// LOOP
function animate(){
  requestAnimationFrame(animate);
  if(!player) return;

  if(started){
    if(keys['ArrowUp']) velocity+=accel;
    else velocity*=friction;

    velocity=Math.min(maxSpeed,velocity);

    if(keys['ArrowLeft']) angle+=turnSpeed;
    if(keys['ArrowRight']) angle-=turnSpeed;

    drift+=(angle-drift)*0.1;
    drift*=driftFactor;

    player.rotation.y=drift;
    player.position.x+=Math.sin(drift)*velocity;
    player.position.z-=Math.cos(drift)*velocity;

    // CHECKPOINTS
    let cp=checkpoints[checkpointIndex];
    if(player.position.distanceTo(cp)<10){
      checkpointIndex++;
      if(checkpointIndex>=checkpoints.length){
        checkpointIndex=0;
        lap++;
        document.getElementById('lap').innerText='Lap: '+lap;
      }
    }

    // AI
    aiCars.forEach(ai=>{
      ai.progress+=0.3;
      let idx=Math.floor(ai.progress)%track.length;
      ai.mesh.position.copy(track[idx]);
    });

    // POSITION
    let rank=1;
    aiCars.forEach(ai=>{
      if(ai.progress > checkpointIndex*50) rank++;
    });
    document.getElementById('pos').innerText='Position: '+rank;

    // UI
    document.getElementById('speed').innerText='Speed: '+Math.floor(velocity*200);
  }

  camera.position.set(player.position.x,8,player.position.z+15);
  camera.lookAt(player.position);

  renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
