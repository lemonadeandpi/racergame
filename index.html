<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Full 3D Racing Game</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui { position:absolute; top:10px; left:10px; color:white; z-index:10; }
#speed { font-size:18px; }
button, select { margin:4px; padding:6px; }
</style>
</head>
<body>

<div id="ui">
  <div id="speed">Speed: 0</div>
  <button onclick="togglePause()">Pause</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script>
// SETUP
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// TRACK (curved using segments)
const track = new THREE.Group();
for (let i=0;i<50;i++){
  const geo = new THREE.PlaneGeometry(10,10);
  const mat = new THREE.MeshStandardMaterial({color:0x222222});
  const segment = new THREE.Mesh(geo,mat);
  segment.rotation.x = -Math.PI/2;
  segment.position.z = -i*10;
  segment.position.x = Math.sin(i*0.2)*5; // curve
  track.add(segment);
}
scene.add(track);

// PLAYER
let player;
let velocity = 0;
let drift = 0;

const loader = new THREE.GLTFLoader();
loader.load('https://threejs.org/examples/models/gltf/Flamingo.glb', (gltf)=>{
  player = gltf.scene;
  player.scale.set(0.01,0.01,0.01);
  scene.add(player);
});

// AI CARS
const aiCars = [];
for(let i=0;i<3;i++){
  const geo = new THREE.BoxGeometry(1,0.5,2);
  const mat = new THREE.MeshStandardMaterial({color:0xff0000});
  const car = new THREE.Mesh(geo,mat);
  car.position.z = -20 - i*10;
  aiCars.push(car);
  scene.add(car);
}

// CONTROLS
let keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

// STATE
let paused=false;
function togglePause(){paused=!paused;}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.body.requestFullscreen();
  else document.exitFullscreen();
}

// RESIZE
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// LOOP
function animate(){
  requestAnimationFrame(animate);
  if(!player) return;

  if(!paused){
    // ACCELERATION
    if(keys['ArrowUp']) velocity += 0.01;
    else velocity *= 0.98;

    // DRIFT
    if(keys['ArrowLeft']) drift -= 0.02;
    if(keys['ArrowRight']) drift += 0.02;
    drift *= 0.9;

    player.position.z -= velocity;
    player.position.x += drift;

    // AI MOVEMENT
    aiCars.forEach((car,i)=>{
      car.position.z -= 0.1 + i*0.02;
      car.position.x = Math.sin(car.position.z*0.1)*3;
    });

    // CAMERA FOLLOW
    camera.position.set(player.position.x, 3, player.position.z + 6);
    camera.lookAt(player.position);

    // SPEED UI
    document.getElementById('speed').innerText = 'Speed: ' + (velocity*100).toFixed(0);
  }

  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
